<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeMarkdown</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="style.css" />
  <!-- highlight.js GitHub 主题 -->
  <link rel="stylesheet" href="lib/github-hljs.min.css" id="code-theme-light" />
  <link rel="stylesheet" href="lib/github-dark-hljs.min.css" id="code-theme-dark" disabled />
  <!-- marked v4.3.0 UMD -->
  <script src="lib/marked.min.js"></script>
  <!-- highlight.js 浏览器 UMD 版（含全语言） -->
  <script src="lib/highlight.min.js"></script>
  <!-- KaTeX：LaTeX 公式渲染 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
</head>
<body>
  <header class="toolbar">
    <div class="toolbar-left">
      <img src="logo-light.svg" alt="WeMarkdown" class="toolbar-logo logo-light" />
      <img src="logo-dark.svg" alt="WeMarkdown" class="toolbar-logo logo-dark" style="display:none" />
      <span class="toolbar-title">WeMarkdown</span>
    </div>
    <div class="toolbar-right">
      <button class="tool-btn icon-btn" id="theme-toggle" title="切换主题">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="sun-icon"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="moon-icon" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <main class="editor-container">
    <!-- 编辑区 -->
    <div class="panel editor-panel">
      <div class="panel-header">
        <span class="panel-label">Markdown</span>
        <span class="char-count" id="char-count">0 字符</span>
      </div>
      <div class="editor-body">
        <div class="line-numbers" id="line-numbers"></div>
        <textarea id="editor" spellcheck="false" placeholder="在此输入 Markdown 内容..."></textarea>
      </div>
    </div>

    <div class="divider" id="divider"><div class="divider-line"></div></div>

    <!-- 预览区 -->
    <div class="panel preview-panel">
      <div class="panel-header">
        <span class="panel-label">预览</span>
        <span class="width-label" id="width-label">400px</span>
      </div>
      <div class="preview-bg" id="preview-bg">
        <div class="preview-card" id="preview-card">
          <div class="markdown-body" id="preview"></div>
        </div>
        <!-- 左右拖拽把手（sticky，始终可见） -->
        <div class="card-handle card-handle-left" id="card-handle-left"><div class="card-handle-bar"></div></div>
        <div class="card-handle card-handle-right" id="card-handle-right"><div class="card-handle-bar"></div></div>
      </div>
    </div>

    <!-- Inspector 面板 -->
    <div class="inspector-panel" id="inspector-panel">
      <div class="panel-header"><span class="panel-label">Inspector</span></div>
      <div class="inspector-content" id="inspector-content">
        <div class="inspector-placeholder">点击预览区域中的元素查看样式参数</div>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
